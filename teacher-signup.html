<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>교사 계정 신청</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-functions-compat.js"></script>
    <script src="firebase-config.js"></script>
    <style>
        body {
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f0f2f5;
        }

        .container {
            background: white;
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            max-width: 400px;
            width: 100%;
        }

        h1 {
            color: #4ECDC4;
            text-align: center;
            margin-bottom: 1.5rem;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 10px;
            background-color: #4ECDC4;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover {
            background-color: #3ebdb5;
        }

        .note {
            font-size: 0.8em;
            color: #666;
            margin-bottom: 15px;
            background: #fff8e1;
            padding: 10px;
            border-radius: 4px;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>교사 계정 신청</h1>
        <div class="note">
            신청할 이메일과 비밀번호를 직접 정해주세요. 관리자가 승인하면 같은 이메일과 비밀번호로 로그인할 수 있습니다.
        </div>
        <input type="text" id="display-name" placeholder="교사 이름" required>
        <input type="email" id="email" placeholder="교사 이메일" required>
        <input type="password" id="password" placeholder="비밀번호 (6자리 이상)" required autocomplete="new-password">
        <input type="password" id="confirm-password" placeholder="비밀번호 확인" required autocomplete="new-password">
        <input type="text" id="school-name" placeholder="학교명 (선택)">
        <button onclick="requestTeacher()">교사 계정 신청하기</button>
        <p style="text-align:center; margin-top: 1rem; font-size: 0.9rem;">
            <a href="login.html" style="color:#4ECDC4; text-decoration:none; font-weight:bold;">로그인으로 돌아가기</a>
        </p>
    </div>

    <script>
        async function requestTeacher() {
            const displayName = document.getElementById('display-name').value.trim();
            const email = document.getElementById('email').value.trim().toLowerCase();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirm-password').value;
            const schoolName = document.getElementById('school-name').value.trim();

            if (!displayName || !email) {
                alert('교사 이름과 이메일을 입력해주세요.');
                return;
            }

            if (password.length < 6) {
                alert('비밀번호는 6자리 이상이어야 합니다.');
                return;
            }

            if (password !== confirmPassword) {
                alert('비밀번호 확인이 일치하지 않습니다.');
                return;
            }

            try {
                const userCredential = await auth.createUserWithEmailAndPassword(email, password);
                const teacherUid = userCredential.user.uid;

                await db.collection('users').doc(teacherUid).set({
                    uid: teacherUid,
                    email,
                    name: displayName,
                    displayName,
                    schoolName,
                    role: 'teacher',
                    approved: false,
                    isAdmin: false,
                    createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                    updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                });

                await db.collection('teacher_requests').add({
                    teacherUid,
                    email,
                    displayName,
                    schoolName,
                    status: 'pending',
                    createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                    updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                });

                await auth.signOut();
                alert('교사 신청이 접수되었습니다. 관리자 승인 후 같은 이메일과 비밀번호로 로그인할 수 있습니다.');
                window.location.href = 'login.html';
            } catch (error) {
                console.error(error);
                if (auth.currentUser) {
                    await auth.signOut().catch(() => {});
                }

                if (error.code === 'auth/email-already-in-use') {
                    alert('이미 사용 중인 이메일입니다. 기존 계정으로 로그인하거나 관리자에게 문의해주세요.');
                    return;
                }

                alert('오류 발생: ' + (error.message || '교사 신청에 실패했습니다.'));
            }
        }
    </script>
</body>

</html>
