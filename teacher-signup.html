<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>교사 계정 신청</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-functions-compat.js"></script>
    <script src="firebase-config.js"></script>
    <style>
        body {
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f0f2f5;
        }

        .container {
            background: white;
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            max-width: 400px;
            width: 100%;
        }

        h1 {
            color: #4ECDC4;
            text-align: center;
            margin-bottom: 1.5rem;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 10px;
            background-color: #4ECDC4;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover {
            background-color: #3ebdb5;
        }

        .note {
            font-size: 0.8em;
            color: #666;
            margin-bottom: 15px;
            background: #fff8e1;
            padding: 10px;
            border-radius: 4px;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>교사 계정 신청</h1>
        <div class="note">
            신청 후 관리자가 승인하면 교사 계정과 반 코드가 생성됩니다. 승인 후 안내받은 임시 비밀번호로 로그인해주세요.
        </div>
        <input type="text" id="display-name" placeholder="교사 이름" required>
        <input type="email" id="email" placeholder="교사 이메일" required>
        <input type="text" id="school-name" placeholder="학교명 (선택)">
        <button onclick="requestTeacher()">교사 계정 신청하기</button>
        <p style="text-align:center; margin-top: 1rem; font-size: 0.9rem;">
            <a href="login.html" style="color:#4ECDC4; text-decoration:none; font-weight:bold;">로그인으로 돌아가기</a>
        </p>
    </div>

    <script>
        async function requestTeacher() {
            const displayName = document.getElementById('display-name').value.trim();
            const email = document.getElementById('email').value;
            const schoolName = document.getElementById('school-name').value.trim();

            if (!displayName || !email) {
                alert('교사 이름과 이메일을 입력해주세요.');
                return;
            }

            try {
                const requestTeacherSignup = firebaseFns.httpsCallable('requestTeacherSignup');
                await requestTeacherSignup({
                    email,
                    displayName,
                    schoolName
                });

                alert('교사 신청이 접수되었습니다. 관리자 승인 후 로그인할 수 있습니다.');
                window.location.href = 'login.html';
            } catch (error) {
                console.error(error);
                alert('오류 발생: ' + (error.message || '교사 신청에 실패했습니다.'));
            }
        }
    </script>
</body>

</html>
